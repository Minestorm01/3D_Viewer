<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ring Viewer</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
font-family:Arial;
}

#viewer{
width:100vw;
height:100vh;
}

#controls{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

button{
margin:4px;
padding:6px 10px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="controls">

<b>Metal</b><br>

<button onclick="setMetal('yellow')">Yellow Gold</button>
<button onclick="setMetal('white')">White Gold</button>
<button onclick="setMetal('rose')">Rose Gold</button>

</div>

<script type="module" src="./viewer.js"></script>

</body>
</html>
